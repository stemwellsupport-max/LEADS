<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Stemwell v4.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
        
        .login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 3rem; width: 400px; text-align: center; }
        .login-box h1 { color: #58a6ff; font-size: 1.8rem; margin-bottom: 0.5rem; }
        .login-box p { color: #8b949e; margin-bottom: 2rem; font-size: 0.9rem; }
        .login-box input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #c9d1d9; font-size: 0.95rem; }
        .login-box button { width: 100%; padding: 0.8rem; background: #238636; border: none; border-radius: 8px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .login-box button:hover { background: #2ea043; }
        .login-error { color: #f85149; margin-top: 1rem; font-size: 0.85rem; display: none; }
        
        .app { display: none; }
        .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: #58a6ff; font-size: 1.3rem; }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .header-right span { color: #8b949e; font-size: 0.85rem; }
        .btn-logout { padding: 0.4rem 1rem; background: #da3633; border: none; border-radius: 6px; color: white; cursor: pointer; font-size: 0.8rem; }
        .btn-logout:hover { background: #f85149; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s; }
        .stat-card:hover { border-color: #58a6ff; transform: translateY(-2px); }
        .stat-num { font-size: 2rem; font-weight: 700; color: #58a6ff; }
        .stat-label { color: #8b949e; font-size: 0.75rem; text-transform: uppercase; margin-top: 0.3rem; letter-spacing: 0.5px; }
        
        .leads-table { background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem; }
        .leads-table h2 { padding: 1rem 1.5rem; color: #58a6ff; font-size: 1.1rem; border-bottom: 1px solid #30363d; }
        .filters { display: flex; gap: 0.5rem; padding: 0.8rem 1.5rem; flex-wrap: wrap; border-bottom: 1px solid #21262d; }
        .filter-btn { padding: 0.35rem 0.9rem; border: 1px solid #30363d; border-radius: 20px; background: transparent; color: #8b949e; cursor: pointer; font-size: 0.75rem; transition: all 0.2s; }
        .filter-btn:hover { border-color: #58a6ff; color: #c9d1d9; }
        .filter-btn.active { background: #1f6feb; color: white; border-color: #1f6feb; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 0.7rem 1rem; background: #0d1117; color: #8b949e; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 0.65rem 1rem; border-bottom: 1px solid #21262d; font-size: 0.85rem; cursor: pointer; }
        tr:hover { background: #1c2128; }
        
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.7rem; font-weight: 500; }
        .badge-new { background: #1f6feb22; color: #58a6ff; border: 1px solid #1f6feb44; }
        .badge-won { background: #23863622; color: #3fb950; border: 1px solid #23863644; }
        .badge-scheduled { background: #9e6a0322; color: #d29922; border: 1px solid #9e6a0344; }
        .badge-lost { background: #da363322; color: #f85149; border: 1px solid #da363344; }
        .badge-medical { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }
        .badge-info { background: #1f6feb22; color: #58a6ff; border: 1px solid #1f6feb44; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 2rem; width: 700px; max-height: 85vh; overflow-y: auto; }
        .modal-content h3 { color: #58a6ff; margin-bottom: 0.3rem; }
        .modal-subtitle { color: #8b949e; font-size: 0.85rem; margin-bottom: 1rem; }
        .modal-content label { display: block; color: #8b949e; font-size: 0.75rem; margin: 1rem 0 0.3rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .modal-content select, .modal-content textarea, .modal-content input { width: 100%; padding: 0.6rem; margin-bottom: 0.5rem; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #c9d1d9; font-size: 0.9rem; }
        .modal-content select:focus, .modal-content textarea:focus, .modal-content input:focus { outline: none; border-color: #58a6ff; }
        .modal-content button { padding: 0.6rem 1.2rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; margin-right: 0.5rem; transition: all 0.2s; }
        .btn-save { background: #238636; color: white; }
        .btn-save:hover { background: #2ea043; }
        .btn-close { background: #30363d; color: #c9d1d9; }
        .btn-close:hover { background: #484f58; }
        
        .comentarios-box { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin: 0.5rem 0; max-height: 120px; overflow-y: auto; font-size: 0.85rem; color: #8b949e; white-space: pre-wrap; }
        .historial-box { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin: 0.5rem 0; max-height: 180px; overflow-y: auto; font-size: 0.8rem; color: #8b949e; }
        .historial-item { padding: 0.35rem 0; border-bottom: 1px solid #21262d; }
        .historial-item:last-child { border-bottom: none; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 1rem 1.5rem; border-radius: 8px; color: white; font-weight: 600; z-index: 999; animation: slideIn 0.3s; }
        .toast-ok { background: #238636; }
        .toast-err { background: #da3633; }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .hidden { display: none !important; }
        .flex { display: flex; gap: 1rem; }
        .flex > div { flex: 1; }
        
        .estado-actual { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .estado-pill { padding: 0.3rem 0.8rem; border-radius: 12px; font-size: 0.75rem; background: #21262d; border: 1px solid #30363d; }
        .estado-pill span { color: #8b949e; margin-right: 0.3rem; }
        .estado-pill strong { color: #c9d1d9; }
        
        .warning-text { color: #d29922; font-size: 0.8rem; margin-top: 0.3rem; }
    </style>
</head>
<body>

<!-- ============================================ -->
<!-- LOGIN -->
<!-- ============================================ -->
<div class="login-screen" id="login-screen">
    <div class="login-box">
        <h1>🏥 CRM Stemwell v4.0</h1>
        <p>Panel de Asesores y Doctores</p>
        <input type="email" id="login-email" placeholder="Email" autocomplete="email">
        <input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password">
        <button onclick="login()">Ingresar</button>
        <div class="login-error" id="login-error">Credenciales inválidas</div>
    </div>
</div>

<!-- ============================================ -->
<!-- APP PRINCIPAL -->
<!-- ============================================ -->
<div class="app" id="app">
    <div class="header">
        <h1>🏥 CRM Stemwell</h1>
        <div class="header-right">
            <span id="user-info"></span>
            <button class="btn-logout" onclick="logout()">Salir</button>
        </div>
    </div>
    
    <div class="container">
        <!-- TARJETAS DE ESTADÍSTICAS -->
        <div class="stats" id="stats-container">
            <div class="stat-card" onclick="filtrar('all')">
                <div class="stat-num" id="s-total">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-card" id="stat-card-1" onclick="filtrar('new')">
                <div class="stat-num" id="s-stat1">0</div>
                <div class="stat-label" id="s-label1">Nuevos</div>
            </div>
            <div class="stat-card" id="stat-card-2" onclick="filtrar('scheduled')">
                <div class="stat-num" id="s-stat2">0</div>
                <div class="stat-label" id="s-label2">Agendados</div>
            </div>
            <div class="stat-card" id="stat-card-3" onclick="filtrar('won')">
                <div class="stat-num" id="s-stat3">0</div>
                <div class="stat-label" id="s-label3">Ganados</div>
            </div>
        </div>
        
        <!-- PANEL DE CANCELADOS (SOLO ASESORES) -->
        <div class="leads-table" id="panel-cancelados" style="display:none;">
            <h2>❌ Citas Canceladas / Perdidas</h2>
            <div style="padding:1rem;" id="cancelados-body">Cargando...</div>
        </div>
        
        <!-- TABLA DE LEADS -->
        <div class="leads-table">
            <h2>📋 Leads</h2>
            <div class="filters" id="filters-container">
                <button class="filter-btn active" onclick="filtrar('all')">Todos</button>
            </div>
            <table>
                <thead>
                    <tr id="table-headers">
                        <th>Nombre</th>
                        <th>Teléfono</th>
                        <th>Email</th>
                        <th>Estado</th>
                        <th>Cita</th>
                        <th>Doctor</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody id="leads-body">
                    <tr><td colspan="7" style="text-align:center;padding:2rem;color:#8b949e;">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- ============================================ -->
<!-- MODAL DETALLE -->
<!-- ============================================ -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3 id="modal-nombre"></h3>
        <p class="modal-subtitle" id="modal-info"></p>
        
        <!-- Estados actuales -->
        <div class="estado-actual" id="estado-actual"></div>
        
        <!-- Contenedor dinámico para selectores de estado -->
        <div id="estado-select-container"></div>
        
        <!-- Selector de doctor (para asesor cuando agenda) -->
        <div id="doctor-select-container" class="hidden">
            <label>Asignar Doctor</label>
            <select id="modal-doctor">
                <option value="">Seleccionar doctor...</option>
            </select>
        </div>
        
        <!-- Fecha de tratamiento (para asesor cuando agenda tratamiento) -->
        <div id="treatment-date-container" class="hidden">
            <label>Fecha de Tratamiento</label>
            <input type="datetime-local" id="modal-treatment-date">
        </div>
        
        <!-- Razón de rechazo (para doctor cuando rechaza candidato) -->
        <div id="rejection-reason-container" class="hidden">
            <label>Razón de Rechazo</label>
            <select id="modal-rejection-reason">
                <option value="">Seleccionar razón...</option>
                <option value="No interés">No interés</option>
                <option value="Dinero">Dinero</option>
                <option value="Cáncer o malignidad activa">Cáncer o malignidad activa</option>
                <option value="Infecciones sistémicas no controladas">Infecciones sistémicas no controladas</option>
                <option value="Falla orgánica descompensada">Falla orgánica descompensada</option>
                <option value="Trastornos hematológicos severos">Trastornos hematológicos severos</option>
                <option value="Daño estructural avanzado o pérdida irreversible de tejido">Daño estructural avanzado o pérdida irreversible de tejido</option>
                <option value="Expectativas fuera del alcance clínico">Expectativas fuera del alcance clínico</option>
                <option value="Evaluación de historial clínico e imágenes">Evaluación de historial clínico e imágenes</option>
            </select>
        </div>
        
        <label>Comentario</label>
        <textarea id="modal-comentario" rows="2" placeholder="Añade un comentario..."></textarea>
        <button class="btn-save" onclick="guardarCambios()">💾 Guardar Cambios</button>
        
        <label>Comentarios anteriores</label>
        <div class="comentarios-box" id="modal-comentarios">Sin comentarios</div>
        
        <label>Historial de cambios</label>
        <div class="historial-box" id="modal-historial">Cargando...</div>
        
        <button class="btn-close" onclick="cerrarModal()" style="margin-top:1rem;">Cerrar</button>
    </div>
</div>

<!-- ============================================ -->
<!-- SCRIPTS -->
<!-- ============================================ -->
<script>
// ============================================
// CONFIGURACIÓN
// ============================================
const API = "https://stiffly-rubdown-uncheck.ngrok-free.dev";
const HEADERS = {
    "Content-Type": "application/json",
    "ngrok-skip-browser-warning": "1"
};

// Estados por pipeline
const SALES_STATUSES = [
    "New Lead", "First Contact", "No Answer", "Follow Up", "Interested",
    "Appointment Scheduled", "Treatment Follow-Up", "scheduled treatment",
    "canceled treatment", "Won", "Lost"
];

const APPOINTMENT_STATUSES = ["Scheduled", "Confirmed", "Rescheduled", "No Show", "Completed"];

const MEDICAL_STATUSES = [
    "Pending Evaluation", "Consultation Completed", "Candidate Approved",
    "Candidate Rejected", "Treatment Proposal Sent", "Treatment Scheduled",
    "In Treatment", "Treatment Completed"
];

// Transiciones permitidas para asesores
const ASESOR_TRANSITIONS = {
    "New Lead": ["First Contact", "No Answer", "Follow Up", "Interested", "Appointment Scheduled", "Lost"],
    "First Contact": ["Follow Up", "Interested", "Appointment Scheduled", "No Answer", "Lost"],
    "No Answer": ["Follow Up", "First Contact", "Lost"],
    "Follow Up": ["Interested", "Appointment Scheduled", "Lost"],
    "Interested": ["Appointment Scheduled", "Follow Up", "Lost"],
    "Appointment Scheduled": ["Won", "Lost", "canceled treatment"],
    "Treatment Follow-Up": ["scheduled treatment", "Lost"],
    "scheduled treatment": ["Won", "Lost", "canceled treatment"],
    "canceled treatment": ["Treatment Follow-Up", "Lost"],
    "Won": [],
    "Lost": []
};

// ============================================
// VARIABLES GLOBALES
// ============================================
let usuarioActual = null;
let leadsData = [];
let leadSeleccionado = null;
let filtroActual = "all";

// ============================================
// PERSISTENCIA DE SESIÓN
// ============================================
const savedUser = localStorage.getItem("crm_user_v4");
if (savedUser) {
    try {
        usuarioActual = JSON.parse(savedUser);
        mostrarApp();
    } catch(e) {
        localStorage.removeItem("crm_user_v4");
    }
}

// ============================================
// LOGIN
// ============================================
async function login() {
    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    
    if (!email || !password) {
        document.getElementById("login-error").textContent = "Completa todos los campos";
        document.getElementById("login-error").style.display = "block";
        return;
    }
    
    try {
        const res = await fetch(API + "/login", {
            method: "POST",
            headers: HEADERS,
            body: JSON.stringify({ email, password })
        });
        
        if (!res.ok) {
            document.getElementById("login-error").style.display = "block";
            return;
        }
        
        usuarioActual = await res.json();
        localStorage.setItem("crm_user_v4", JSON.stringify(usuarioActual));
        mostrarApp();
    } catch(e) {
        document.getElementById("login-error").textContent = "Error de conexión";
        document.getElementById("login-error").style.display = "block";
    }
}

// Permitir login con Enter
document.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && document.getElementById("login-screen").style.display !== "none") {
        login();
    }
});

function logout() {
    localStorage.removeItem("crm_user_v4");
    location.reload();
}

// ============================================
// INICIALIZACIÓN DE LA APP
// ============================================
function mostrarApp() {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("user-info").textContent = `👤 ${usuarioActual.nombre} (${usuarioActual.rol})`;
    
    // Configurar UI según rol
    configurarUI();
    
    // Cargar datos
    cargarLeads();
    cargarDoctores();
    
    if (usuarioActual.rol === "asesor") {
        document.getElementById("panel-cancelados").style.display = "block";
        cargarCancelados();
    }
}

function configurarUI() {
    // Configurar tarjetas de estadísticas
    if (usuarioActual.rol === "asesor") {
        document.getElementById("s-label1").textContent = "Nuevos";
        document.getElementById("s-label2").textContent = "Agendados";
        document.getElementById("s-label3").textContent = "Ganados";
        document.getElementById("stat-card-1").onclick = () => filtrar("New Lead");
        document.getElementById("stat-card-2").onclick = () => filtrar("Appointment Scheduled");
        document.getElementById("stat-card-3").onclick = () => filtrar("Won");
    } else if (usuarioActual.rol === "doctor") {
        document.getElementById("s-label1").textContent = "Pendientes";
        document.getElementById("s-label2").textContent = "En Tratamiento";
        document.getElementById("s-label3").textContent = "Completados";
        document.getElementById("stat-card-1").onclick = () => filtrar("Pending Evaluation");
        document.getElementById("stat-card-2").onclick = () => filtrar("In Treatment");
        document.getElementById("stat-card-3").onclick = () => filtrar("Treatment Completed");
    }
    
    // Configurar filtros
    const filtersContainer = document.getElementById("filters-container");
    filtersContainer.innerHTML = '<button class="filter-btn active" onclick="filtrar(\'all\')">Todos</button>';
    
    if (usuarioActual.rol === "asesor") {
        ["New Lead", "First Contact", "Follow Up", "Appointment Scheduled", "Treatment Follow-Up", "scheduled treatment", "Won", "Lost"].forEach(status => {
            filtersContainer.innerHTML += `<button class="filter-btn" onclick="filtrar('${status}')">${status}</button>`;
        });
    } else if (usuarioActual.rol === "doctor") {
        ["Pending Evaluation", "Consultation Completed", "Candidate Approved", "Treatment Scheduled", "In Treatment", "Treatment Completed"].forEach(status => {
            filtersContainer.innerHTML += `<button class="filter-btn" onclick="filtrar('${status}')">${status}</button>`;
        });
    }
    
    // Configurar cabeceras de tabla
    const tableHeaders = document.getElementById("table-headers");
    if (usuarioActual.rol === "asesor") {
        tableHeaders.innerHTML = `
            <th>Nombre</th>
            <th>Teléfono</th>
            <th>Email</th>
            <th>Estado Ventas</th>
            <th>Cita</th>
            <th>Doctor</th>
            <th>Fecha</th>
        `;
    } else if (usuarioActual.rol === "doctor") {
        tableHeaders.innerHTML = `
            <th>Nombre</th>
            <th>Teléfono</th>
            <th>Email</th>
            <th>Estado Médico</th>
            <th>Cita</th>
            <th>Asesor</th>
            <th>Fecha</th>
        `;
    }
}

// ============================================
// CARGAR LEADS
// ============================================
async function cargarLeads() {
    if (!usuarioActual) return;
    
    try {
        const url = `${API}/leads/usuario/${usuarioActual.id}${filtroActual !== "all" ? `?estado=${encodeURIComponent(filtroActual)}` : ""}`;
        const res = await fetch(url, { headers: HEADERS });
        const data = await res.json();
        leadsData = data.leads || [];
        renderLeads();
        renderStats();
    } catch(e) {
        console.error("Error cargando leads:", e);
    }
}

function renderLeads() {
    const tbody = document.getElementById("leads-body");
    
    if (leadsData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:#8b949e;">No hay leads</td></tr>`;
        return;
    }
    
    tbody.innerHTML = leadsData.map(l => {
        const salesStatus = l.sales_status || "";
        const medicalStatus = l.medical_status || "";
        const appointmentStatus = l.appointment_status || "";
        
        // Determinar badge para el estado principal
        let badgeClass = "badge-new";
        let estadoPrincipal = "";
        
        if (usuarioActual.rol === "asesor") {
            estadoPrincipal = salesStatus;
            if (salesStatus === "Won") badgeClass = "badge-won";
            else if (salesStatus.includes("Scheduled") || salesStatus === "Appointment Scheduled") badgeClass = "badge-scheduled";
            else if (salesStatus === "Lost" || salesStatus === "canceled treatment") badgeClass = "badge-lost";
        } else if (usuarioActual.rol === "doctor") {
            estadoPrincipal = medicalStatus;
            if (medicalStatus === "Treatment Completed") badgeClass = "badge-won";
            else if (medicalStatus === "Treatment Scheduled" || medicalStatus === "In Treatment") badgeClass = "badge-scheduled";
            else if (medicalStatus === "Candidate Rejected") badgeClass = "badge-lost";
            else if (medicalStatus === "Pending Evaluation") badgeClass = "badge-medical";
        }
        
        // Badge para cita
        let citaBadge = "";
        if (appointmentStatus === "Confirmed") citaBadge = '<span class="badge badge-won">Confirmada</span>';
        else if (appointmentStatus === "Scheduled") citaBadge = '<span class="badge badge-scheduled">Agendada</span>';
        else if (appointmentStatus === "No Show") citaBadge = '<span class="badge badge-lost">No Show</span>';
        else if (appointmentStatus === "Rescheduled") citaBadge = '<span class="badge badge-medical">Reagendada</span>';
        else if (appointmentStatus === "Completed") citaBadge = '<span class="badge badge-won">Completada</span>';
        else citaBadge = '<span style="color:#484f58;">—</span>';
        
        return `<tr onclick="abrirModal(${l.id})">
            <td><strong>${l.nombre}</strong></td>
            <td>${l.telefono || "-"}</td>
            <td style="font-size:0.8rem;">${l.email || "-"}</td>
            <td><span class="badge ${badgeClass}">${estadoPrincipal || "—"}</span></td>
            <td>${citaBadge}</td>
            <td>${l.doctor_nombre || "—"}</td>
            <td>${(l.fecha_creacion || "").slice(0,10)}</td>
        </tr>`;
    }).join("");
}

function renderStats() {
    const total = leadsData.length;
    document.getElementById("s-total").textContent = total;
    
    if (usuarioActual.rol === "asesor") {
        document.getElementById("s-stat1").textContent = leadsData.filter(l => l.sales_status === "New Lead").length;
        document.getElementById("s-stat2").textContent = leadsData.filter(l => l.sales_status === "Appointment Scheduled" || l.sales_status === "scheduled treatment").length;
        document.getElementById("s-stat3").textContent = leadsData.filter(l => l.sales_status === "Won").length;
    } else if (usuarioActual.rol === "doctor") {
        document.getElementById("s-stat1").textContent = leadsData.filter(l => l.medical_status === "Pending Evaluation").length;
        document.getElementById("s-stat2").textContent = leadsData.filter(l => l.medical_status === "In Treatment" || l.medical_status === "Treatment Scheduled").length;
        document.getElementById("s-stat3").textContent = leadsData.filter(l => l.medical_status === "Treatment Completed").length;
    }
}

// ============================================
// CANCELADOS (SOLO ASESORES)
// ============================================
async function cargarCancelados() {
    if (!usuarioActual || usuarioActual.rol !== "asesor") return;
    
    try {
        const res = await fetch(`${API}/leads/cancelados/${usuarioActual.id}`, { headers: HEADERS });
        const data = await res.json();
        const leads = data.leads || [];
        
        document.getElementById("cancelados-body").innerHTML = leads.length === 0 
            ? '<p style="color:#8b949e;">No hay citas canceladas</p>'
            : leads.map(l => `
                <div style="padding:0.5rem;border-bottom:1px solid #21262d;cursor:pointer;" onclick="abrirModal(${l.id})">
                    • <strong>${l.nombre}</strong> - ${l.telefono} 
                    <span style="color:#8b949e;font-size:0.8rem;">(${l.sales_status || l.medical_status})</span>
                </div>`).join("");
    } catch(e) {
        console.error("Error cargando cancelados:", e);
    }
}

// ============================================
// CARGAR DOCTORES
// ============================================
async function cargarDoctores() {
    try {
        const res = await fetch(`${API}/doctores`, { headers: HEADERS });
        const data = await res.json();
        const select = document.getElementById("modal-doctor");
        select.innerHTML = '<option value="">Seleccionar doctor...</option>';
        (data.usuarios || []).forEach(d => {
            select.innerHTML += `<option value="${d.id}">${d.nombre}</option>`;
        });
    } catch(e) {
        console.error("Error cargando doctores:", e);
    }
}

// ============================================
// FILTROS
// ============================================
function filtrar(estado) {
    filtroActual = estado;
    
    // Actualizar botones activos
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    if (event && event.target) {
        event.target.classList.add("active");
    }
    
    cargarLeads();
}

// ============================================
// MODAL DE DETALLE
// ============================================
async function abrirModal(id) {
    leadSeleccionado = leadsData.find(l => l.id === id);
    if (!leadSeleccionado) return;
    
    document.getElementById("modal-nombre").textContent = leadSeleccionado.nombre;
    document.getElementById("modal-info").textContent = 
        `${leadSeleccionado.telefono || "Sin teléfono"} | ${leadSeleccionado.email || "Sin email"} | Canal: ${leadSeleccionado.canal || "N/A"}`;
    document.getElementById("modal-comentarios").textContent = leadSeleccionado.comentarios || "Sin comentarios";
    document.getElementById("modal-comentario").value = "";
    
    // Mostrar estados actuales
    const estadoActual = document.getElementById("estado-actual");
    estadoActual.innerHTML = `
        <div class="estado-pill"><span>Ventas:</span> <strong>${leadSeleccionado.sales_status || "—"}</strong></div>
        <div class="estado-pill"><span>Cita:</span> <strong>${leadSeleccionado.appointment_status || "—"}</strong></div>
        <div class="estado-pill"><span>Médico:</span> <strong>${leadSeleccionado.medical_status || "—"}</strong></div>
    `;
    
    // Si hay razón de rechazo, mostrarla
    if (leadSeleccionado.rejection_reason) {
        estadoActual.innerHTML += `
            <div class="estado-pill" style="background:#da363322;border-color:#da363344;">
                <span>Rechazo:</span> <strong style="color:#f85149;">${leadSeleccionado.rejection_reason}</strong>
            </div>
        `;
    }
    
    // Si hay fecha de tratamiento, mostrarla
    if (leadSeleccionado.treatment_date) {
        estadoActual.innerHTML += `
            <div class="estado-pill" style="background:#23863622;border-color:#23863644;">
                <span>Tratamiento:</span> <strong style="color:#3fb950;">${new Date(leadSeleccionado.treatment_date).toLocaleString()}</strong>
            </div>
        `;
    }
    
    // Ocultar todos los contenedores condicionales
    document.getElementById("doctor-select-container").classList.add("hidden");
    document.getElementById("treatment-date-container").classList.add("hidden");
    document.getElementById("rejection-reason-container").classList.add("hidden");
    
    // Construir selectores según rol
    const estadoSelectContainer = document.getElementById("estado-select-container");
    
    if (usuarioActual.rol === "asesor") {
        // Obtener transiciones permitidas
        const currentStatus = leadSeleccionado.sales_status || "New Lead";
        const allowedTransitions = ASESOR_TRANSITIONS[currentStatus] || [];
        
        if (allowedTransitions.length === 0) {
            estadoSelectContainer.innerHTML = `
                <label>Estado de Ventas</label>
                <p style="color:#d29922;font-size:0.85rem;">⚠️ No hay transiciones disponibles desde "${currentStatus}"</p>
            `;
        } else {
            let options = allowedTransitions.map(s => 
                `<option value="${s}">${s}</option>`
            ).join("");
            
            estadoSelectContainer.innerHTML = `
                <label>Cambiar Estado de Ventas</label>
                <select id="modal-sales-status" onchange="onSalesStatusChange()">
                    <option value="">Seleccionar nuevo estado...</option>
                    ${options}
                </select>
            `;
        }
        
        // Verificar si debemos mostrar selectores adicionales por defecto
        verificarSelectoresAdicionales();
        
    } else if (usuarioActual.rol === "doctor") {
        estadoSelectContainer.innerHTML = `
            <div class="flex">
                <div>
                    <label>Estado de la Cita</label>
                    <select id="modal-appointment-status">
                        <option value="">No cambiar</option>
                        ${APPOINTMENT_STATUSES.map(s => `<option value="${s}" ${leadSeleccionado.appointment_status === s ? 'selected' : ''}>${s}</option>`).join("")}
                    </select>
                </div>
                <div>
                    <label>Estado Médico</label>
                    <select id="modal-medical-status" onchange="onMedicalStatusChange()">
                        <option value="">No cambiar</option>
                        ${MEDICAL_STATUSES.map(s => `<option value="${s}" ${leadSeleccionado.medical_status === s ? 'selected' : ''}>${s}</option>`).join("")}
                    </select>
                </div>
            </div>
        `;
        
        // Verificar si ya está seleccionado "Candidate Rejected"
        setTimeout(() => onMedicalStatusChange(), 100);
    }
    
    document.getElementById("modal").style.display = "flex";
    
    // Cargar historial
    cargarHistorial(id);
}

// ============================================
// FUNCIONES PARA SELECTORES CONDICIONALES
// ============================================
function onSalesStatusChange() {
    const selectedStatus = document.getElementById("modal-sales-status")?.value;
    
    // Mostrar/ocultar selector de doctor
    const doctorContainer = document.getElementById("doctor-select-container");
    if (selectedStatus === "Appointment Scheduled") {
        doctorContainer.classList.remove("hidden");
    } else {
        doctorContainer.classList.add("hidden");
    }
    
    // Mostrar/ocultar selector de fecha de tratamiento
    const treatmentContainer = document.getElementById("treatment-date-container");
    if (selectedStatus === "scheduled treatment") {
        treatmentContainer.classList.remove("hidden");
    } else {
        treatmentContainer.classList.add("hidden");
    }
}

function onMedicalStatusChange() {
    const selectedStatus = document.getElementById("modal-medical-status")?.value;
    const rejectionContainer = document.getElementById("rejection-reason-container");
    
    if (selectedStatus === "Candidate Rejected") {
        rejectionContainer.classList.remove("hidden");
    } else {
        rejectionContainer.classList.add("hidden");
    }
}

function verificarSelectoresAdicionales() {
    // Si el lead ya está en un estado que requiere datos adicionales
    if (leadSeleccionado) {
        if (leadSeleccionado.sales_status === "Appointment Scheduled") {
            document.getElementById("doctor-select-container").classList.remove("hidden");
        }
    }
}

// ============================================
// CERRAR MODAL
// ============================================
function cerrarModal() {
    document.getElementById("modal").style.display = "none";
    leadSeleccionado = null;
}

// Cerrar modal al hacer clic fuera
document.getElementById("modal").addEventListener("click", function(e) {
    if (e.target === this) cerrarModal();
});

// ============================================
// CARGAR HISTORIAL
// ============================================
async function cargarHistorial(leadId) {
    try {
        const res = await fetch(`${API}/leads/${leadId}/historial`, { headers: HEADERS });
        const data = await res.json();
        const historial = data.historial || [];
        
        document.getElementById("modal-historial").innerHTML = historial.length === 0
            ? '<p style="color:#8b949e;">Sin cambios registrados</p>'
            : historial.map(h => `
                <div class="historial-item">
                    <strong>${h.nombre || "Sistema"}</strong>: 
                    ${h.estado_anterior || "—"} → ${h.estado_nuevo || "—"} 
                    <small>(${new Date(h.fecha).toLocaleString()})</small>
                    ${h.comentario ? `<br><em style="color:#8b949e;">${h.comentario}</em>` : ""}
                </div>`).join("");
    } catch(e) {
        document.getElementById("modal-historial").innerHTML = '<p style="color:#f85149;">Error al cargar historial</p>';
    }
}

// ============================================
// GUARDAR CAMBIOS
// ============================================
async function guardarCambios() {
    if (!leadSeleccionado) return;
    
    const comentario = document.getElementById("modal-comentario").value.trim();
    
    let body = {
        lead_id: leadSeleccionado.id,
        usuario_id: usuarioActual.id,
        comentario: comentario
    };
    
    if (usuarioActual.rol === "asesor") {
        const salesStatus = document.getElementById("modal-sales-status")?.value;
        if (!salesStatus) {
            toast("❌ Selecciona un estado de ventas", true);
            return;
        }
        body.sales_status = salesStatus;
        
        // Agregar doctor si está visible y seleccionado
        const doctorSelect = document.getElementById("modal-doctor");
        const doctorContainer = document.getElementById("doctor-select-container");
        if (!doctorContainer.classList.contains("hidden") && doctorSelect.value) {
            body.doctor_id = parseInt(doctorSelect.value);
        }
        
        // Agregar fecha de tratamiento si está visible
        const treatmentDate = document.getElementById("modal-treatment-date");
        const treatmentContainer = document.getElementById("treatment-date-container");
        if (!treatmentContainer.classList.contains("hidden") && treatmentDate.value) {
            body.treatment_date = treatmentDate.value;
        }
        
    } else if (usuarioActual.rol === "doctor") {
        const appointmentStatus = document.getElementById("modal-appointment-status")?.value;
        const medicalStatus = document.getElementById("modal-medical-status")?.value;
        
        if (!appointmentStatus && !medicalStatus) {
            toast("❌ Selecciona al menos un estado para cambiar", true);
            return;
        }
        
        if (appointmentStatus) body.appointment_status = appointmentStatus;
        if (medicalStatus) body.medical_status = medicalStatus;
        
        // Agregar razón de rechazo si aplica
        if (medicalStatus === "Candidate Rejected") {
            const rejectionReason = document.getElementById("modal-rejection-reason")?.value;
            if (!rejectionReason) {
                toast("❌ Selecciona una razón de rechazo", true);
                return;
            }
            body.rejection_reason = rejectionReason;
        }
    }
    
    try {
        const res = await fetch(API + "/leads/estado", {
            method: "PUT",
            headers: HEADERS,
            body: JSON.stringify(body)
        });
        
        if (res.ok) {
            const data = await res.json();
            toast("✅ " + (data.message || "Estado actualizado correctamente"));
            cerrarModal();
            cargarLeads();
            if (usuarioActual.rol === "asesor") cargarCancelados();
        } else {
            const err = await res.json();
            toast("❌ Error: " + (err.detail || "Error desconocido"), true);
        }
    } catch(e) {
        toast("❌ Error de conexión", true);
    }
}

// ============================================
// TOAST (NOTIFICACIONES)
// ============================================
function toast(msg, err = false) {
    const t = document.createElement("div");
    t.className = "toast " + (err ? "toast-err" : "toast-ok");
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3500);
}

// ============================================
// CIERRE CON TECLA ESCAPE
// ============================================
document.addEventListener("keydown", function(e) {
    if (e.key === "Escape" && document.getElementById("modal").style.display === "flex") {
        cerrarModal();
    }
});
</script>
